appVersion: '0.1'
kind: playbook
id: unit-decision-review
packId: trading-coach
version: 1.1.0
description: Forensic review of a specific trade or position decision
playbookReportId: UnitDecisionReview
inputs:
  evaluation:
    type: boolean
    default: true
  reviewFocus:
    type: enum
    values:
    - lifecycle
    - stale
    - event
    default: lifecycle
  eventType:
    type: string
    optional: true
requires:
- workflow: ../../layer0-workflows/datastore-merge-and-validate
- workflow: ../../layer0-workflows/structured-input-discovery
- workflow: ../../layer0-workflows/period-scope-confirmation
uses:
- when: reviewFocus lifecycle
  skill: ../../layer1-skills/symbol-trading-analysis
- when: reviewFocus stale
  skill: ../../layer1-skills/stale-position-hygiene
- when: reviewFocus event
  skill: ../../layer1-skills/event-trade-context
embeds:
- optional: true
  skill: ../../layer1-skills/market-environment
overlays:
- id: trade-evaluation
  path: overlays/trade-evaluation.md
  kind: evaluation
  when: evaluation
outputs:
  primary:
    type: report
    pathTemplate: '{userDatastore}/reports/{timestamp}-UnitDecisionReview-{{analysisPeriodStart}}-{{analysisPeriodEnd}}/Report.md'
    contract: contracts/report-artifact-contract.md
  runManifest:
    type: run-record
    pathTemplate: '{userDatastore}/reports/{timestamp}-UnitDecisionReview-{{analysisPeriodStart}}-{{analysisPeriodEnd}}/run-manifest.yaml'
